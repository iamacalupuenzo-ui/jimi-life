<div class="manual">

  <header class="manual__topbar">
    <button class="manual__close" type="button" (click)="close()" aria-label="Cerrar">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <p class="manual__hint">
    Puedes encontrar el IMEI/SN en la parte trasera de la caja o en el dispositivo.
  </p>

  <div class="manual__art-wrap" aria-hidden="true">
    <svg class="manual__art" viewBox="0 0 260 210" fill="none">
      <!-- Sombra -->
      <ellipse cx="120" cy="196" rx="86" ry="12" fill="var(--neutral-300)" opacity="0.45"/>

      <!-- Caja isométrica -->
      <path d="M48 94 L120 136 L120 190 L48 148 Z" fill="var(--gold-500)"/>
      <path d="M120 136 L192 94 L192 148 L120 190 Z" fill="var(--gold-600)"/>
      <path d="M120 52 L192 94 L120 136 L48 94 Z" fill="var(--gold-300)"/>

      <!-- Cinta -->
      <path d="M120 52 L157 73 L120 94 L83 73 Z" fill="var(--gold-200)" opacity="0.9"/>

      <!-- QR sobre la tapa -->
      <g transform="translate(101 76) scale(0.55)">
        <rect x="0" y="0" width="40" height="40" rx="4" fill="var(--neutral-0)"/>
        <rect x="4" y="4" width="11" height="11" rx="2" fill="var(--neutral-900)"/>
        <rect x="7" y="7" width="5" height="5" fill="var(--neutral-0)"/>
        <rect x="25" y="4" width="11" height="11" rx="2" fill="var(--neutral-900)"/>
        <rect x="28" y="7" width="5" height="5" fill="var(--neutral-0)"/>
        <rect x="4" y="25" width="11" height="11" rx="2" fill="var(--neutral-900)"/>
        <rect x="7" y="28" width="5" height="5" fill="var(--neutral-0)"/>
        <rect x="22" y="22" width="3" height="3" fill="var(--neutral-900)"/>
        <rect x="29" y="22" width="3" height="3" fill="var(--neutral-900)"/>
        <rect x="25" y="27" width="3" height="3" fill="var(--neutral-900)"/>
        <rect x="32" y="29" width="3" height="3" fill="var(--neutral-900)"/>
        <rect x="22" y="32" width="3" height="3" fill="var(--neutral-900)"/>
      </g>

      <!-- Lupa -->
      <circle cx="196" cy="80" r="45" fill="var(--neutral-200)" opacity="0.5"/>
      <circle cx="196" cy="80" r="44" fill="var(--neutral-0)" stroke="var(--neutral-200)" stroke-width="1.5"/>
      <g transform="translate(170 54) scale(1.3)">
        <rect x="4" y="4" width="11" height="11" rx="2" fill="var(--neutral-900)"/>
        <rect x="7" y="7" width="5" height="5" fill="var(--neutral-0)"/>
        <rect x="25" y="4" width="11" height="11" rx="2" fill="var(--neutral-900)"/>
        <rect x="28" y="7" width="5" height="5" fill="var(--neutral-0)"/>
        <rect x="4" y="25" width="11" height="11" rx="2" fill="var(--neutral-900)"/>
        <rect x="7" y="28" width="5" height="5" fill="var(--neutral-0)"/>
        <rect x="22" y="22" width="3" height="3" fill="var(--neutral-900)"/>
        <rect x="29" y="22" width="3" height="3" fill="var(--neutral-900)"/>
        <rect x="25" y="27" width="3" height="3" fill="var(--neutral-900)"/>
        <rect x="32" y="29" width="3" height="3" fill="var(--neutral-900)"/>
        <rect x="22" y="32" width="3" height="3" fill="var(--neutral-900)"/>
      </g>
    </svg>
  </div>

  <div class="manual__field">
    <input
      #codeInput
      class="manual__input"
      type="text"
      inputmode="text"
      autocomplete="off"
      placeholder="Introduce IMEI/SN"
      [value]="code()"
      (input)="code.set(codeInput.value)"
      aria-label="IMEI o número de serie"
    />
    <button class="manual__scan" type="button" (click)="scan()" aria-label="Escanear código">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 8V5.5A1.5 1.5 0 0 1 5.5 4H8M16 4h2.5A1.5 1.5 0 0 1 20 5.5V8M20 16v2.5a1.5 1.5 0 0 1-1.5 1.5H16M8 20H5.5A1.5 1.5 0 0 1 4 18.5V16"
          stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M4 12h16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <button class="manual__continue" type="button" [disabled]="!canContinue()" (click)="continue()">
    Continuar
  </button>
</div>
