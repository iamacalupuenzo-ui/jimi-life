<article class="card" [class]="'card--' + device().aura">
  <div class="card__aura" aria-hidden="true"></div>

  <header class="card__top">
    <div>
      <h3 class="card__name">{{ device().name }}</h3>
      <p class="card__model">{{ device().model }}</p>
    </div>
    <button class="card__settings" type="button" [attr.aria-label]="'Ajustes de ' + device().name">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/>
        <path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2-1.2L14.2 3h-4l-.4 2.5a7 7 0 0 0-2 1.2l-2.3-1-2 3.4 2 1.5a7 7 0 0 0 0 2.4l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2 1.2l.4 2.5h4l.4-2.5a7 7 0 0 0 2-1.2l2.3 1 2-3.4-2-1.5c.06-.4.1-.8.1-1.2Z"
          stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <button class="card__stage" type="button" (click)="open()">
    <img class="card__image" [src]="device().imageUrl" [alt]="device().model" loading="lazy" />
  </button>

  <div class="card__chips">
    @if (device().battery !== null) {
      <span class="chip" [class.chip--danger]="batteryLevel() === 'low'" [class.chip--success]="batteryLevel() === 'high'">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="3" y="8" width="15" height="8" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
          <rect x="5.5" y="10.5" width="7" height="3" rx="1" fill="currentColor"/>
          <path d="M21 10.5v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        {{ device().battery }}%
      </span>
    }

    @if (device().withYou) {
      <span class="chip chip--brand">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 21s-6.5-5.4-6.5-10a6.5 6.5 0 0 1 13 0c0 4.6-6.5 10-6.5 10Z" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="12" cy="11" r="2.4" fill="currentColor"/>
        </svg>
        Contigo
      </span>
    } @else {
      <span class="chip">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.6"/>
          <path d="M12 8v4.5l2.8 1.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        {{ device().lastSeenLabel }}
      </span>
    }

    <span class="chip" [class.chip--info]="isConnected()">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M6.5 8 17 16.5l-5 4v-17l5 4L6.5 16" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
      {{ isConnected() ? 'Conectado' : 'Sin conexión' }}
    </span>
  </div>

  <footer class="card__footer">
    <svg class="card__pin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 21s-6.5-5.4-6.5-10a6.5 6.5 0 0 1 13 0c0 4.6-6.5 10-6.5 10Z" fill="currentColor" opacity="0.2"/>
      <path d="M12 21s-6.5-5.4-6.5-10a6.5 6.5 0 0 1 13 0c0 4.6-6.5 10-6.5 10Z" stroke="currentColor" stroke-width="1.6"/>
      <circle cx="12" cy="11" r="2.4" fill="currentColor"/>
    </svg>
    <span class="card__address">{{ device().address }}</span>
  </footer>
</article>
