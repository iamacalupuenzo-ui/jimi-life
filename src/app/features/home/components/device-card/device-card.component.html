<article class="card" [class]="'card--' + device().aura">
  <div class="card__aura" aria-hidden="true"></div>

  <div class="card__main">
    <img class="card__thumb" [src]="device().imageUrl" [alt]="device().model" loading="lazy" />

    <div class="card__info">
      <h3 class="card__name">
        <button class="card__link" type="button" (click)="open()">
          {{ device().name }}
        </button>
      </h3>

      <div class="card__chips">
        @if (device().battery !== null && isConnected()) {
          <span class="chip">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"
              class="chip__icon chip__icon--battery" [class.chip__icon--ok]="batteryLevel() === 'high'" [class.chip__icon--low]="batteryLevel() === 'low'">
              <rect x="2" y="6" width="17" height="12" rx="3.5" fill="currentColor"/>
              <rect x="20.5" y="9.5" width="2.5" height="5" rx="1.25" fill="currentColor"/>
            </svg>
            {{ device().battery }}%
          </span>
        }

        @if (device().withYou) {
          <span class="chip">
            <svg class="chip__icon chip__icon--ok" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path fill-rule="evenodd" clip-rule="evenodd" fill="currentColor"
                d="M12 4.5a7.5 7.5 0 1 0 0 15 7.5 7.5 0 0 0 0-15Zm0 10a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5Z"/>
              <rect x="11" y="1.5" width="2" height="4" rx="1" fill="currentColor"/>
              <rect x="11" y="18.5" width="2" height="4" rx="1" fill="currentColor"/>
              <rect x="1.5" y="11" width="4" height="2" rx="1" fill="currentColor"/>
              <rect x="18.5" y="11" width="4" height="2" rx="1" fill="currentColor"/>
            </svg>
            Contigo
          </span>
        } @else {
          <span class="chip">
            <svg class="chip__icon chip__icon--ok" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="10" fill="currentColor"/>
              <path d="M12 6.5V12l3.6 2.1" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            {{ device().lastSeenLabel }}
          </span>
        }

        <span class="chip">
          @if (isConnected()) {
            <svg class="chip__icon chip__icon--info" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6.5 8 17 16.5l-5 4v-17l5 4L6.5 16" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
          } @else {
            <svg class="chip__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 10V3.5l5 4-3.2 2.6M12 14v6.5l5-4L6.5 8" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M4.5 4.5l15 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          }
          {{ isConnected() ? 'Conectado' : 'Sin conexión' }}
        </span>
      </div>
    </div>
  </div>

  <footer class="card__footer">
    <svg class="card__pin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 21s-6.5-5.4-6.5-10a6.5 6.5 0 0 1 13 0c0 4.6-6.5 10-6.5 10Z" fill="currentColor" opacity="0.2"/>
      <path d="M12 21s-6.5-5.4-6.5-10a6.5 6.5 0 0 1 13 0c0 4.6-6.5 10-6.5 10Z" stroke="currentColor" stroke-width="1.6"/>
      <circle cx="12" cy="11" r="2.4" fill="currentColor"/>
    </svg>
    <span class="card__address">{{ device().address }}</span>
  </footer>
</article>
