<nav class="nav" aria-label="Navegación principal">
  @for (item of items; track item.path) {
    <a
      class="nav__item"
      [routerLink]="item.path"
      routerLinkActive="nav__item--active"
      [attr.aria-label]="item.label"
    >
      <span class="nav__pill">
        @switch (item.icon) {
          @case ('home') {
            <svg class="nav__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 10.5 12 4l8 6.5V19a1.5 1.5 0 0 1-1.5 1.5h-4V15a2.5 2.5 0 0 0-5 0v5.5h-4A1.5 1.5 0 0 1 4 19v-8.5Z"
                stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
          }
          @case ('user') {
            <svg class="nav__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="8" r="3.6" stroke="currentColor" stroke-width="1.8"/>
              <path d="M5 20c.8-3.2 3.6-5 7-5s6.2 1.8 7 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          }
        }
      </span>
      <span class="nav__label">{{ item.label }}</span>
    </a>
  }
</nav>
