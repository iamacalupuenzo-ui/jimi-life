<nav class="nav" aria-label="Navegación principal">
  @for (item of items; track item.path) {
    <a
      class="nav__item"
      [routerLink]="item.path"
      routerLinkActive="nav__item--active"
      [attr.aria-label]="item.label"
    >
      <span class="nav__icon-wrap">
        @if (item.icon === 'home') {
          <!-- Casa rellena (activo) / outline (inactivo) — se controla con CSS fill/stroke -->
          <svg class="nav__icon nav__icon--home" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 11.5 12 4l9 7.5V21a1 1 0 0 1-1 1H15v-6H9v6H4a1 1 0 0 1-1-1V11.5Z"/>
          </svg>
        }
        @if (item.icon === 'user') {
          <svg class="nav__icon nav__icon--user" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="8" r="4" fill="currentColor"/>
            <path d="M4 20c1-4.5 4-7 8-7s7 2.5 8 7" fill="currentColor"/>
          </svg>
        }
      </span>
      <span class="nav__label">{{ item.label }}</span>
    </a>
  }
</nav>
